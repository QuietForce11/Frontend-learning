<!DOCTYPE html>
<html>
<head>
  <title>AJAX Demo</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f9f9f9;
    }

    h1 {
      color: steelblue;
    }

    button {
      padding: 8px 14px;
      background: steelblue;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #2c6aa0;
    }

    #result {
      margin-top: 20px;
      padding: 10px;
      background: #eee;
      border-radius: 4px;
      min-height: 30px;
    }
  </style>
</head>

<body>

<h1>AJAX Demo</h1>

<button onclick="loadData()">Load Data</button>

<p id="result"></p>

<script>
function loadData() {
  document.getElementById("result").textContent = "Loading...";

  fetch("https://jsonplaceholder.typicode.com/posts/1")
    .then(res => res.json())
    .then(data => {
      document.getElementById("result").textContent = data.title;
    })
    .catch(() => {
      document.getElementById("result").textContent = "Error loading data";
    });
}
</script>

</body>
</html>
