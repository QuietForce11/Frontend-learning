<!DOCTYPE html>
<html>
<head>
  <title>Design Patterns Demo</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f9f9f9;
    }

    h1 {
      color: steelblue;
    }

    button {
      padding: 8px 14px;
      margin: 5px;
      background: steelblue;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #2c6aa0;
    }

    #result {
      margin-top: 20px;
      padding: 10px;
      background: #eee;
      border-radius: 4px;
      min-height: 30px;
    }
  </style>
</head>

<body>

<h1>Design Patterns Demo</h1>

<button onclick="runSingleton()">Singleton</button>
<button onclick="runFactory()">Factory</button>
<button onclick="runObserver()">Observer</button>
<button onclick="runStrategy()">Strategy</button>
<button onclick="runFacade()">Facade</button>

<p id="result"></p>

<script>
  let output = document.getElementById("result");

  // SINGLETON
  class Database {
    static instance = null;

    constructor() {
      if (Database.instance) return Database.instance;
      this.status = "Connected";
      Database.instance = this;
    }
  }

  function runSingleton() {
    let a = new Database();
    let b = new Database();
    output.textContent = "Singleton: " + (a === b);
  }


  // FACTORY
  class UserFactory {
    static create(type) {
      if (type === "admin") return { role: "Admin", access: "All" };
      return { role: "Guest", access: "Limited" };
    }
  }

  function runFactory() {
    let u1 = UserFactory.create("admin");
    let u2 = UserFactory.create("guest");
    output.textContent = u1.role + " & " + u2.role;
  }


  // OBSERVER
  class Channel {
    constructor() {
      this.subscribers = [];
    }

    subscribe(name) {
      this.subscribers.push(name);
    }

    notify(msg) {
      return this.subscribers.map(s => s + " got " + msg).join(" | ");
    }
  }

  let channel = new Channel();

  function runObserver() {
    channel = new Channel();
    channel.subscribe("John");
    channel.subscribe("Jane");
    output.textContent = channel.notify("New Video");
  }


  // STRATEGY
  class Payment {
    constructor(method) {
      this.method = method;
    }

    pay(amount) {
      return this.method(amount);
    }
  }

  const card = amt => "Paid " + amt + " by Card";
  const paypal = amt => "Paid " + amt + " by PayPal";

  function runStrategy() {
    let p1 = new Payment(card);
    let p2 = new Payment(paypal);

    output.textContent = p1.pay(1000) + " | " + p2.pay(2000);
  }


  // FACADE
  class Flight {
    book() { return "Flight booked"; }
  }

  class Hotel {
    book() { return "Hotel booked"; }
  }

  class Car {
    book() { return "Car booked"; }
  }

  class TravelFacade {
    constructor() {
      this.flight = new Flight();
      this.hotel = new Hotel();
      this.car = new Car();
    }

    bookTrip() {
      return this.flight.book() + ", " +
             this.hotel.book() + ", " +
             this.car.book();
    }
  }

  function runFacade() {
    let trip = new TravelFacade();
    output.textContent = trip.bookTrip();
  }
</script>

</body>
</html>
